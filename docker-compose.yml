services:
  mysql:
    image: mysql:8.0
    container_name: aimp_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: aimp
      MYSQL_USER: aimp
      MYSQL_PASSWORD: aimp123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aimp_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: aimp_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: aimp
      RABBITMQ_DEFAULT_PASS: aimp123

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aimp_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: ./backend
    container_name: aimp_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+aiomysql://aimp:aimp123@mysql:3306/aimp
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://aimp:aimp123@rabbitmq:5672/
      JWT_SECRET_KEY: aimp-secret-key-change-in-production
      CELERY_BROKER_URL: amqp://aimp:aimp123@rabbitmq:5672/
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: ./backend
    container_name: aimp_celery
    environment:
      DATABASE_URL: mysql+aiomysql://aimp:aimp123@mysql:3306/aimp
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://aimp:aimp123@rabbitmq:5672/
      CELERY_BROKER_URL: amqp://aimp:aimp123@rabbitmq:5672/
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - mysql
      - redis
      - rabbitmq
    command: celery -A celeryconfig worker --loglevel=info

  celery_beat:
    build: ./backend
    container_name: aimp_celery_beat
    environment:
      CELERY_BROKER_URL: amqp://aimp:aimp123@rabbitmq:5672/
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - mysql
      - redis
      - rabbitmq
    command: celery -A celeryconfig beat --loglevel=info

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: aimp_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    environment:
      - VITE_API_URL=http://localhost:8000

  nginx:
    image: nginx:alpine
    container_name: aimp_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
