# Blackbox exporter configuration for probing external APIs
modules:
  http_2xx:
    prober: http
    http:
      method: GET
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 201, 204, 301, 302, 401, 403]
      follow_redirects: true
      fail_if_ssl: false
      tls_config:
        insecure_skip_verify: false
      preferred_ip_protocol: ip4
      ip_protocol_fallback: true
      timeout: 10s

  http_post_2xx:
    prober: http
    http:
      method: POST
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 201, 204]
      timeout: 10s

  tcp_connect:
    prober: tcp
    tcp:
      preferred_ip_protocol: ip4
      timeout: 5s

  icmp:
    prober: icmp
    icmp:
      preferred_ip_protocol: ip4
      timeout: 5s
