name: AIMP CI Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]

jobs:
  # === Phase 1: Quality Gates ===
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Alembic Drift Check
        run: |
          cd backend
          python scripts/quality/alembic_drift_check.py

      - name: Endpoint Registration Check
        run: |
          cd backend
          python scripts/quality/endpoint_registration_check.py

      - name: Forbidden Mock Detector
        run: |
          cd backend
          python scripts/quality/forbidden_mock_detector.py

      - name: Smoke Test Runner
        run: |
          cd backend
          python scripts/quality/smoke_test_runner.py

  # === Phase 2: Lint & Type Check ===
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint deps
        run: |
          cd backend
          pip install ruff mypy
      - name: Ruff lint
        run: |
          cd backend
          ruff check app/ --ignore E501,W291
      - name: MyPy type check
        run: |
          cd backend
          mypy app/ --ignore-missing-imports --no-error-summary || true

  # === Phase 3: Security Scan ===
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install bandit
      - name: Secret scan (Bandit)
        run: |
          cd backend
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ -ll || true

  # === Phase 4: Migration Validation ===
  migration-validation:
    name: MySQL Migration Validation
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_test_root
          MYSQL_DATABASE: aimp_ci_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Wait for MySQL
        run: |
          while ! mysqladmin ping -h127.0.0.1 --silent; do sleep 1; done
      - name: Run migrations
        run: |
          cd backend
          export DATABASE_URL=mysql+aiomysql://root:ci_test_root@127.0.0.1:3306/aimp_ci_test
          alembic upgrade head
      - name: Verify tables
        run: |
          mysql -h127.0.0.1 -uroot -pci_test_root -e "USE aimp_ci_test; SHOW TABLES;" | wc -l
      - name: Test downgrade
        run: |
          cd backend
          export DATABASE_URL=mysql+aiomysql://root:ci_test_root@127.0.0.1:3306/aimp_ci_test
          alembic downgrade -1
          alembic upgrade head

  # === Phase 5: Pytest ===
  test:
    name: Smoke & Integration Tests
    runs-on: ubuntu-latest
    needs: [quality-gates]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Run smoke tests
        run: |
          cd backend
          pytest app/tests/test_smoke_integration.py -v --tb=short || true
      - name: Run WebSocket tests
        run: |
          cd backend
          pytest app/tests/test_websocket.py -v --tb=short || true

  # === Phase 6: Frontend Build ===
  frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: |
          cd frontend
          npm install
      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit || true
      - name: Build
        run: |
          cd frontend
          npm run build || true
