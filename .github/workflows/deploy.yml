name: Deploy to Railway

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend
        run: |
          cd backend && railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 17b41d5d-0bb0-44ab-be45-4c93f0d00406

  deploy-frontend:
    name: Deploy Frontend to Railway
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Install & Build Frontend
        run: |
          npm install
          npm run build

      - name: Deploy Frontend
        run: |
          railway up --service frontend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 17b41d5d-0bb0-44ab-be45-4c93f0d00406

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    steps:
      - name: Wait for deployment
        run: sleep 45

      - name: Check Backend Health
        run: |
          echo "Checking backend health..."
          curl -sf https://aimp-backend.railway.app/api/health || echo "Backend health check failed"
          curl -sf https://aimp-backend.railway.app/api/health/db || echo "DB health check failed"
          curl -sf https://aimp-backend.railway.app/api/health/redis || echo "Redis health check failed"
        continue-on-error: true
