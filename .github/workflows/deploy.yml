name: Deploy to Railway

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend
        run: |
          cd backend
          railway up --service "ai-marketing-backend"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Frontend
        run: |
          railway up --service "ai-marketing-frontend"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Check API Health
        run: |
          curl -sf "${{ vars.BACKEND_URL }}/api/health" || exit 1

      - name: Check DB Health
        run: |
          curl -sf "${{ vars.BACKEND_URL }}/api/health/db" || exit 1

      - name: Check Redis Health
        run: |
          curl -sf "${{ vars.BACKEND_URL }}/api/health/redis" || exit 1
