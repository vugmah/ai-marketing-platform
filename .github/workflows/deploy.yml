name: Deploy to Railway

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'

jobs:
  # ── Build & Test ──────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend deps
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run syntax check
        run: |
          cd backend
          python -m py_compile app/main.py

  # ── Deploy Backend ────────────────────────────
  deploy-backend:
    name: Deploy Backend
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: List Railway services
        run: railway service list
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Backend to Railway
        run: |
          cd backend
          railway up
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

  # ── Deploy Frontend ───────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    needs: deploy-backend
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Frontend to Railway
        run: |
          railway up --service "ai-marketing-frontend"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

  # ── Health Check ──────────────────────────────
  health-check:
    name: Post-Deploy Health Check
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 45

      - name: Check API Health
        run: |
          curl -sf "${{ vars.BACKEND_URL }}/api/health" || exit 1

      - name: Check DB Health
        run: |
          curl -sf "${{ vars.BACKEND_URL }}/api/health/db" || exit 1

      - name: Check Redis Health
        run: |
          curl -sf "${{ vars.BACKEND_URL }}/api/health/redis" || exit 1

      - name: Smoke Test - Auth
        run: |
          curl -sf -X POST "${{ vars.BACKEND_URL }}/api/v2/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"test@example.com","password":"test"}' || true

      - name: Report Status
        run: echo "✅ Deployment health checks passed"
