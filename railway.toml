[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
healthcheckPath = "/api/v2/health/live"
startCommand = "cd backend && python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${PORT} --workers 2"

[deploy.env]
PORT = "8080"
LOG_LEVEL = "INFO"
ENVIRONMENT = "staging"
