groups:
  - name: aimp_backend_alerts
    interval: 30s
    rules:
      - alert: BackendDown
        expr: up{job="aimp-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "AIMP Backend is down"
          description: "Backend has been down for more than 1 minute"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 10% for 2 minutes"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High API latency"
          description: "P95 latency is above 2 seconds"

      - alert: MySQLConnectionsHigh
        expr: mysql_global_status_threads_connected / mysql_global_variables_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MySQL connections high"
          description: "MySQL connection usage above 80%"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory above 85%"

      - alert: CeleryQueueDepth
        expr: celery_queue_length > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Celery queue backlog"
          description: "Queue depth exceeds 100 tasks"

      - alert: AIHighCost
        expr: increase(ai_cost_usd_total[1h]) > 50
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "AI cost spike detected"
          description: "AI spend exceeded $50 in the last hour"

      - alert: TenantQuotaViolation
        expr: increase(tenant_quota_violations_total[1h]) > 5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Multiple tenant quota violations"
          description: "A tenant is exceeding resource quotas repeatedly"
