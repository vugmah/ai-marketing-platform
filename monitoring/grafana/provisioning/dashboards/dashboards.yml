# =============================================================================
# Grafana Dashboard Provisioning
# =============================================================================
# Auto-loads all dashboard JSON files from /var/lib/grafana/dashboards.
# Dashboards are imported on startup and refreshed every 30s.
# =============================================================================

apiVersion: 1

providers:
  - name: 'AIMP Dashboards'
    orgId: 1
    folder: 'AI Marketing Platform'
    folderUid: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
