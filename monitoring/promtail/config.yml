# Promtail configuration for shipping logs to Loki
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Backend API logs
  - job_name: aimp-backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: aimp-backend
          __path__: /var/log/aimp/*.log
          host: aimp-backend
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            correlation_id: correlation_id
            event: message.event
      - labels:
          level:
          event:
      - timestamp:
          source: timestamp
          format: RFC3339
